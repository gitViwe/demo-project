events { }
http {
    include mime.types;

    server {
        listen 8080;
        #listen 8081 ssl;
        resolver 127.0.0.11 valid=30s;
        set $auth_backend_url "AUTH_API_URL";

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html =404;
        }
        
        location /feature/feature-flags {
            default_type application/json;
            # Return a 200 OK with a hardcoded JSON body
            return 200 '{
                "features": [
                    "HubFeature_OpenTelemetry"
                ]
            }';
        }
        
        # The Auth API proxy
        location ~ ^/(account|scalar)/ {
            proxy_pass $auth_backend_url; # Placeholder for sed
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'keep-alive';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # OTLP Traces and Metrics Proxy
        location /opentelemetry/v1/ {
            # Point to the otel-collector service name in docker-compose
            proxy_pass http://otel-collector:4318/v1/; 
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        
            # Handle CORS preflight requests if telemetry is coming from a different origin
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,traceparent,tracestate';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
        
        location /auth/web-authentication/credential-options {
            default_type application/json;
            # Return a 200 OK with a hardcoded JSON body
            return 200 '{
                "challenge": "Y2hhbGxlbmdl", 
                "rp": { "name": "Mock Server", "id": "localhost" },
                "user": { "id": "dXNlcmlk", "name": "test-user", "displayName": "Test User" },
                "pubKeyCredParams": [{"type": "public-key", "alg": -7}],
                "timeout": 60000,
                "attestation": "none"
            }';
        }
        
        location ~ ^/auth/web-authentication/credential/.* {
            if ($request_method = PUT) {
                # Return a 200 OK with a hardcoded JSON body
                return 200 '{"status": "success", "message": "Successfully created credentials"}';
            }
            return 405;
        }
        
        location /auth/web-authentication/assertion-options {
            default_type application/json;
            # Return a 200 OK with a hardcoded JSON body
            return 200 '{
                "challenge": "Y2hhbGxlbmdl",
                "timeout": 60000,
                "rpId": "localhost",
                "allowCredentials": [],
                "userVerification": "preferred"
            }';
        }
        
        location /auth/web-authentication/assertion {
            if ($request_method = POST) {
                # Return a 200 OK with a hardcoded JSON body
                return 200 '{"status": "success", "message": "Successfully created token"}';
            }
            return 405;
        }
    }
}